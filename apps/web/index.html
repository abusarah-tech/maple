<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Maple</title>

		<meta
			name="description"
			content="Open-source observability platform. Traces, logs, and metrics for your distributed systems."
		/>
		<meta property="og:title" content="Maple" />
		<meta
			property="og:description"
			content="Open-source observability platform. Traces, logs, and metrics for your distributed systems."
		/>
		<meta property="og:image" content="/og-image.png" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Maple" />
		<meta
			name="twitter:description"
			content="Open-source observability platform. Traces, logs, and metrics for your distributed systems."
		/>
		<meta name="twitter:image" content="/og-image.png" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" href="/favicon.ico" />

		<!-- Apply the saved theme before first paint to avoid a flash of the wrong theme.
		     Must stay in sync with the theme store in @maple/ui/hooks/use-theme
		     (storage key "maple-theme", `light`/`dark` class on <html>, default "dark"). -->
		<script>
			;(() => {
				try {
					let theme = localStorage.getItem("maple-theme") || "dark"
					if (theme !== "light" && theme !== "dark") theme = "dark"
					const root = document.documentElement
					root.classList.remove("light", "dark")
					root.classList.add(theme)
					root.style.colorScheme = theme
				} catch {}
			})()
		</script>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>

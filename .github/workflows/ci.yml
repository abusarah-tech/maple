name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    typescript:
        name: TypeScript
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

            - run: bun install --frozen-lockfile

            - run: bun turbo typecheck test build --filter='!@maple/ingest'

    knip:
        name: Knip
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

            - run: bun install --frozen-lockfile

            - run: bun knip

    # Note: the `apps/ingest` Rust crate is built and tested by
    # `.github/workflows/ingest-rust-tests.yml`, which also runs the load
    # benchmark and posts results to the PR.
